<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PassReg — local password generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; min-height: 100%; }
    html { background: #18140f; }
    body {
      background: #18140f;
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      color: #e9e0c8;
      min-height: 100vh;
    }
    /* Center the terminal on wide viewports — feels like reading a manpage,
       not a stretched dashboard. */
    .stage {
      max-width: 880px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#18140f"/>
      <text x="50" y="68" font-family="ui-monospace, 'IBM Plex Mono', monospace"
            font-size="56" font-weight="600" fill="#e3a14a" text-anchor="middle">»</text>
    </svg>
  </template>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "amber",
      "showMemo": true,
      "showRules": true
    }/*EDITMODE-END*/;
  </script>

  <script src="generators.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="terminal.jsx"></script>

  <script type="text/babel">
    function StandaloneApp() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <>
          <div className="stage">
            <DirectionC
              accent={t.accent}
              showMemo={t.showMemo}
              showRules={t.showRules}
            />
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme" />
            <TweakColor
              label="Accent"
              value={ACCENT_SWATCHES[t.accent] || ACCENT_SWATCHES.amber}
              options={Object.values(ACCENT_SWATCHES)}
              onChange={(v) => {
                const k = Object.keys(ACCENT_SWATCHES).find(
                  (kk) => JSON.stringify(ACCENT_SWATCHES[kk]) === JSON.stringify(v)
                );
                if (k) setTweak("accent", k);
              }}
            />
            <TweakSection label="Content" />
            <TweakToggle label="Picture memo"
                         value={t.showMemo}
                         onChange={(v) => setTweak("showMemo", v)} />
            <TweakToggle label="ASCII rules"
                         value={t.showRules}
                         onChange={(v) => setTweak("showRules", v)} />
          </TweaksPanel>
        </>
      );
    }

    // Accent palettes — hero color first (the actual accent), with the dark
    // canvas + cream ink as supporting swatches so the chip in the picker
    // previews the full triad rather than just one stripe.
    const ACCENT_SWATCHES = {
      amber:    ["#e3a14a", "#18140f", "#e9e0c8"],
      phosphor: ["#9ec57a", "#18140f", "#e9e0c8"],
      cyan:     ["#6cb8b8", "#18140f", "#e9e0c8"],
      crimson:  ["#d96e54", "#18140f", "#e9e0c8"],
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<StandaloneApp />);
  </script>
</body>
</html>
